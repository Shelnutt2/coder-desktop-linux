name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  WAYLAND_VERSION: "1.23.1"
  WLROOTS_VERSION: "0.19.0"

jobs:
  lint:
    name: Lint (clang-format)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21 (clang-format)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-21

      - name: Run clang-format
        run: |
          find app/src -type f \( -name '*.h' -o -name '*.cpp' \) \
            -exec clang-format-21 --dry-run --Werror {} +
          find coder-dlp-compositor/src -type f \( -name '*.c' -o -name '*.h' \) \
            -exec clang-format-21 --dry-run --Werror {} +

  build-and-test:
    name: Build & Test (${{ matrix.xwayland && 'xwayland' || 'no-xwayland' }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        xwayland: [true, false]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: coder-vpn-linux/go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-tools-dev-tools \
            libqt6quick3d6 \
            libqt6websockets6-dev \
            qt6-webengine-dev \
            libsecret-1-dev \
            wayland-protocols \
            pkg-config \
            bubblewrap \
            ccache \
            ninja-build \
            meson \
            libffi-dev \
            libxml2-dev \
            libdrm-dev \
            libgbm-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgles-dev \
            libpixman-1-dev \
            libseat-dev \
            hwdata \
            libdisplay-info-dev \
            libliftoff-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-composite0-dev \
            libxcb-render-util0-dev \
            libxcb-ewmh-dev \
            libxcb-xinput-dev \
            libxcb-icccm4-dev \
            libxcb-res0-dev

      - name: Build wayland ${{ env.WAYLAND_VERSION }} from source
        run: |
          git clone --depth 1 --branch ${{ env.WAYLAND_VERSION }} https://gitlab.freedesktop.org/wayland/wayland.git /tmp/wayland
          cd /tmp/wayland
          meson setup build --prefix=/usr --buildtype=release -Ddocumentation=false -Dtests=false
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Build wlroots ${{ env.WLROOTS_VERSION }} from source
        run: |
          git clone --depth 1 --branch ${{ env.WLROOTS_VERSION }} https://gitlab.freedesktop.org/wlroots/wlroots.git /tmp/wlroots
          cd /tmp/wlroots
          XWAYLAND_OPT=${{ matrix.xwayland && 'enabled' || 'disabled' }}
          meson setup build --prefix=/usr --buildtype=release -Dxwayland=$XWAYLAND_OPT --wrap-mode=default
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: build-ubuntu-24.04-xwayland-${{ matrix.xwayland }}

      - name: CMake configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build all targets
        run: cmake --build build -j$(nproc)

      - name: Run C++ tests (app)
        run: ctest --test-dir build/app --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Run C tests (DLP compositor)
        run: ctest --test-dir build/coder-dlp-compositor --output-on-failure

      - name: Run Go tests
        working-directory: coder-vpn-linux
        run: go test ./...
