name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  GO_VERSION: "1.25"
  WAYLAND_VERSION: "1.23.1"

jobs:
  # Builds .tar.gz, .deb, .rpm (CPack) and .AppImage (linuxdeploy).
  build-packages:
    name: Build tar.gz / deb / rpm / AppImage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: coder-vpn-linux/go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-tools-dev-tools \
            libqt6quick3d6 \
            libqt6websockets6-dev \
            qt6-webengine-dev \
            libsecret-1-dev \
            wayland-protocols \
            pkg-config \
            bubblewrap \
            ninja-build \
            dpkg-dev \
            rpm \
            meson \
            libffi-dev \
            libxml2-dev \
            libdrm-dev \
            libgbm-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgles-dev \
            libpixman-1-dev \
            libseat-dev \
            hwdata \
            libdisplay-info-dev \
            libliftoff-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-composite0-dev \
            libxcb-render-util0-dev \
            libxcb-ewmh-dev \
            libxcb-xinput-dev \
            libxcb-icccm4-dev \
            libxcb-res0-dev \
            libfuse2t64

      - name: Build wayland ${{ env.WAYLAND_VERSION }} from source
        run: |
          git clone --depth 1 --branch ${{ env.WAYLAND_VERSION }} https://gitlab.freedesktop.org/wayland/wayland.git /tmp/wayland
          cd /tmp/wayland
          meson setup build --prefix=/usr --buildtype=release -Ddocumentation=false -Dtests=false
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: CMake configure (Release)
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCODER_DESKTOP_VERSION="${GITHUB_REF_NAME#v}" \
            -DCPACK_FORCE_ALL_GENERATORS=ON \
            -DWLROOTS_FROM_SOURCE=ON \
            -DWLROOTS_XWAYLAND=OFF

      - name: Build all targets
        run: cmake --build build -j"$(nproc)"

      - name: Run tests
        run: |
          ctest --test-dir build/app --output-on-failure
          ctest --test-dir build/coder-dlp-compositor --output-on-failure
          cd coder-vpn-linux && go test ./...
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Package (tar.gz, deb, rpm)
        run: cd build && cpack

      - name: Install linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy
          sudo mv linuxdeploy-plugin-qt-x86_64.AppImage /usr/local/bin/linuxdeploy-plugin-qt

      - name: Build AppImage
        run: cmake --build build --target appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Gather artifacts
        run: |
          mkdir -p dist
          cp build/*.tar.gz dist/
          cp build/*.deb dist/
          cp build/*.rpm dist/
          cp build/*.AppImage dist/
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*
          if-no-files-found: error

  # Builds the Alpine .apk natively with abuild (musl).
  build-apk:
    name: Build apk (Alpine)
    runs-on: ubuntu-24.04
    container: alpine:3.23
    steps:
      - name: Install checkout prerequisites
        run: apk add --no-cache git tar

      - uses: actions/checkout@v4

      - name: Build apk with abuild
        run: |
          sh packaging/apk/build-apk.sh "${GITHUB_REF_NAME#v}" "$PWD/dist"

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: dist/*.apk
          if-no-files-found: error

  # Builds the snap (classic confinement) with snapcraft.
  build-snap:
    name: Build snap
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build snap
        uses: snapcore/action-build@v3
        id: snapcraft

      - uses: actions/upload-artifact@v4
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

  # Attaches all artifacts to the GitHub release for the tag.
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-packages, build-apk, build-snap]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.apk
            dist/*.AppImage
            dist/*.snap
