name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  security-events: write
  contents: read

env:
  GO_VERSION: "1.25"
  WAYLAND_VERSION: "1.23.1"
  WLROOTS_VERSION: "0.19.0"

jobs:
  analyze-cpp:
    name: Analyze C/C++
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: coder-vpn-linux/go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-tools-dev-tools \
            libqt6quick3d6 \
            libqt6websockets6-dev \
            qt6-webengine-dev \
            libsecret-1-dev \
            wayland-protocols \
            pkg-config \
            bubblewrap \
            ninja-build \
            meson \
            libffi-dev \
            libxml2-dev \
            libdrm-dev \
            libgbm-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgles-dev \
            libpixman-1-dev \
            libseat-dev \
            hwdata \
            libdisplay-info-dev \
            libliftoff-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-composite0-dev \
            libxcb-render-util0-dev \
            libxcb-ewmh-dev \
            libxcb-xinput-dev \
            libxcb-icccm4-dev \
            libxcb-res0-dev

      - name: Cache wayland & wlroots
        id: cache-wayland-wlroots
        uses: actions/cache@v4
        with:
          path: /opt/wayland
          key: wayland-${{ env.WAYLAND_VERSION }}-wlroots-${{ env.WLROOTS_VERSION }}-ubuntu-24.04

      - name: Build wayland ${{ env.WAYLAND_VERSION }} from source
        if: steps.cache-wayland-wlroots.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.WAYLAND_VERSION }} https://gitlab.freedesktop.org/wayland/wayland.git /tmp/wayland
          cd /tmp/wayland
          meson setup build --prefix=/opt/wayland --buildtype=release -Ddocumentation=false
          ninja -C build
          ninja -C build install

      - name: Build wlroots ${{ env.WLROOTS_VERSION }} from source
        if: steps.cache-wayland-wlroots.outputs.cache-hit != 'true'
        run: |
          export PKG_CONFIG_PATH=/opt/wayland/lib/x86_64-linux-gnu/pkgconfig:/opt/wayland/share/pkgconfig:$PKG_CONFIG_PATH
          git clone --depth 1 --branch ${{ env.WLROOTS_VERSION }} https://gitlab.freedesktop.org/wlroots/wlroots.git /tmp/wlroots
          cd /tmp/wlroots
          meson setup build --prefix=/opt/wayland --buildtype=release -Dxwayland=disabled --force-fallback-for=pixman-1
          ninja -C build
          ninja -C build install

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp

      - name: CMake configure
        run: |
          export PKG_CONFIG_PATH=/opt/wayland/lib/x86_64-linux-gnu/pkgconfig:/opt/wayland/share/pkgconfig:$PKG_CONFIG_PATH
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: |
          export LD_LIBRARY_PATH=/opt/wayland/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
          cmake --build build -j$(nproc)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"

  analyze-go:
    name: Analyze Go
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: coder-vpn-linux/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Autobuild Go
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
