<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Terminal</title>
    <link rel="stylesheet" href="xterm.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; /* overridden by JS from URL params */ }
        #terminal-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    <script src="xterm.min.js"></script>
    <script src="addon-fit.min.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script>
        if (typeof Terminal === 'undefined') {
            document.getElementById('terminal-container').style.display = 'none';
            document.body.style.color = '#f44336';
            document.body.style.fontFamily = 'monospace';
            document.body.style.padding = '20px';
            document.body.innerText = 'Failed to load terminal libraries.';
            throw new Error('xterm.js not loaded');
        }

        // Read optional theme colors from URL query parameters (?bg=...&fg=...&cursor=...).
        // Falls back to sensible dark defaults when not provided.
        var params = new URLSearchParams(window.location.search);
        var themeBg = params.get('bg') || '#1e1e1e';
        var themeFg = params.get('fg') || '#d4d4d4';
        var themeCursor = params.get('cursor') || '#d4d4d4';

        // Apply background to body so there's no flash of wrong color.
        document.body.style.background = themeBg;

        var term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: "'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace",
            scrollback: 5000,
            theme: {
                background: themeBg,
                foreground: themeFg,
                cursor: themeCursor,
                cursorAccent: themeBg,
                selectionBackground: '#264f78',
                black: '#1e1e1e',
                red: '#f44747',
                green: '#6a9955',
                yellow: '#d7ba7d',
                blue: '#569cd6',
                magenta: '#c586c0',
                cyan: '#4ec9b0',
                white: '#d4d4d4',
                brightBlack: '#808080',
                brightRed: '#f44747',
                brightGreen: '#6a9955',
                brightYellow: '#d7ba7d',
                brightBlue: '#569cd6',
                brightMagenta: '#c586c0',
                brightCyan: '#4ec9b0',
                brightWhite: '#ffffff'
            }
        });

        var fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));

        if (typeof qt === 'undefined' || !qt.webChannelTransport) {
            term.write('\x1b[31mError: QWebChannel transport not available.\x1b[0m\r\n');
            term.write('The terminal bridge could not connect to the application.\r\n');
            throw new Error('qt.webChannelTransport not available');
        }

        new QWebChannel(qt.webChannelTransport, function(channel) {
            var bridge = channel.objects.terminalBridge;

            // Output from C++ bridge (base64-encoded) → write to terminal.
            bridge.outputReceived.connect(function(b64) {
                var bin = atob(b64);
                var bytes = new Uint8Array(bin.length);
                for (var i = 0; i < bin.length; i++) {
                    bytes[i] = bin.charCodeAt(i);
                }
                term.write(new TextDecoder('utf-8').decode(bytes));
            });

            // User types → send to C++ bridge.
            // Wired immediately — C++ side buffers/drops if not yet connected.
            term.onData(function(data) {
                bridge.sendInput(data);
            });

            // Terminal resized → notify C++ bridge.
            term.onResize(function(size) {
                bridge.resize(size.cols, size.rows);
            });

            window.addEventListener('resize', function() {
                fitAddon.fit();
            });

            // Fit terminal to container and signal ready (initiates WS connection).
            setTimeout(function() {
                fitAddon.fit();
                bridge.notifyReady(term.cols, term.rows);
                term.focus();
            }, 100);
        });
    </script>
</body>
</html>
