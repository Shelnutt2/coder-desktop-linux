app-id: com.coder.CoderDesktop
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang

command: coder-desktop

finish-args:
  # Wayland & X11
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU (for Qt Quick)
  - --device=dri
  # Network access (VPN + API calls)
  - --share=network
  # TUN device for VPN
  - --device=all
  # D-Bus (libsecret / Secret Service, notifications, system tray)
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # Home directory (for config files)
  - --filesystem=xdg-config/coder-desktop:create
  # MDM policy (read-only)
  - --filesystem=/etc/coder-desktop:ro

modules:
  # --- wlroots 0.19 ---
  - name: wlroots
    buildsystem: meson
    config-opts:
      - -Dexamples=false
      - -Dbackends=wayland
      - -Drenderers=gles2
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/wlroots/wlroots/-/releases/0.19.0/downloads/wlroots-0.19.0.tar.gz
        sha256: "FIXME_INSERT_SHA256_HASH"
    cleanup:
      - /include
      - /lib/pkgconfig

  # --- coder-desktop ---
  - name: coder-desktop
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOPATH: /run/build/coder-desktop/.flatpak-builder/cache/go
        GOFLAGS: -mod=vendor
    sources:
      - type: git
        url: https://github.com/coder/coder-desktop-linux.git
        branch: main
